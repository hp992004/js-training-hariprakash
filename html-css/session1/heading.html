<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hierarchy</title>
</head>
<body>
    <h1>My Portfolio</h1>

    <h2>About Me</h2>

    <h2>Skills</h2>
    <h3>JavaScript</h3>

    <h2>Contact</h2>

</body>
</html>

<!--
The heading that should directly follow an <h1> is usually an <h2>, as it
represents the next level in the document hierarchy. Headings should be used
in order without skipping levels to maintain a clear structure for accessibility.
-->
